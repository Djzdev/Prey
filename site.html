<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Game & Emulation Vault</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: #e0e0e0; text-align: center; padding: 50px; }
        h1 { color: #00d4ff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 10px; text-decoration: none; color: white; border: 1px solid #444; transition: 0.3s; }
        .card:hover { background: #3d3d3d; border-color: #00d4ff; transform: translateY(-5px); }
    </style>
</head>
<body>
    <h1>Personal Repository Portal</h1>
    <p>Select a vault to access your files:</p>
    <div class="grid">
        <a href="https://github.com/YourUser/Vault-Pokemon" class="card">Pokémon Diamond & BIOS</a>
        <a href="https://github.com/YourUser/Vault-Prey" class="card">Prey (GOG Backup)</a>
        <a href="https://github.com/YourUser/Dutch-Notes" class="card">Dutch School Notes</a>
    </div>
</body>
</html>
